
debug = 0
verbose = 0
generate = 1
# bind: listening address, "*" (default) means all IPv4 and IPv6 addresses;
# an IPv6 literal is written in brackets: bind = [::1]
#bind = 127.0.0.1
#btcnode = 127.0.0.1:8333
peer = node.qbitcoin.net
# hidden-peer: never advertise this peer to others (and hide it as block/tx origin).
# This alone does NOT make us connect to it; to also connect, list the same address under "peer".
#hidden_peer = 10.0.0.2
# pinned-only: make outgoing connections only to the peers explicitly listed under "peer"
# (no seed/fallback peers, no peers learned from the network), do not request or store
# other nodes' addresses, and advertise port 0 so that remote nodes do not announce us.
# For a hidden (non-public) node; note that the pinned peers still see our address and
# relay our blocks/transactions with it as origin unless they mark us as their hidden-peer.
#pinned_only = 1
dbi = sqlite
database = /var/lib/qbitcoin/qbitcoin.sqlite
# encrypted_private_keys: encrypt the wallet private keys in the database with
# the wallet password (applied by "setwalletpassword", which also decrypts the
# keys back when this is disabled). With encrypted keys the node starts locked:
# staking is paused until "qbitcoin-cli walletunlock" or the staking toggle in
# the web admin interface. Disable to let staking survive a node restart while
# still protecting the REST API with the password. Enabled by default.
#encrypted_private_keys = 0
# allow_password_reset: allow the "setwalletpassword" RPC to reset a FORGOTTEN
# wallet password (changing the password with the current one known is always
# allowed). The reset PERMANENTLY DESTROYS all encrypted private keys - they
# cannot be decrypted without the old password - so it asks for an explicit
# confirmation. Disabled by default; uncomment to allow recovery via local RPC.
#allow_password_reset = 1
log = syslog
loglevel = info

