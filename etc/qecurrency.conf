
debug = 0
verbose = 0
generate = 1
#bind = 127.0.0.1
#ecrnode = 127.0.0.1
peer = seed.ecurrency.org
# hidden-peer: never advertise this peer to others (and hide it as block/tx origin).
# This alone does NOT make us connect to it; to also connect, list the same address under "peer".
#hidden_peer = 10.0.0.2
dbi = sqlite
database = /var/lib/qecurrency/qecurrency.sqlite
# allow_password_reset: allow the "setwalletpassword" RPC to overwrite an already
# set (e.g. forgotten) wallet password. Setting the password when none exists is
# always allowed. Disabled by default; uncomment to allow recovery via local RPC.
#allow_password_reset = 1
log = syslog
loglevel = info

